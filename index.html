<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Baca Alkitab Terpadu</title>
    <style>
        :root {
            --bg: #f5f5f7; --text: #1d1d1f; --card: #ffffff; 
            --primary: #0071e3; --border: #d2d2d7; --btn-bg: #e8e8ed;
            --font-size: 18px; --font-weight: 400;
        }
        [data-theme="dark"] {
            --bg: #000000; --text: #f5f5f7; --card: #1c1c1e; 
            --primary: #0a84ff; --border: #38383a; --btn-bg: #2c2c2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            font-size: var(--font-size); font-weight: var(--font-weight);
            line-height: 1.6; transition: 0.3s;
        }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        input, select, button { 
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--card); color: var(--text);
            font-size: 16px; font-family: inherit;
        }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        
        .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .toolbar button { flex: 1; min-width: 60px; background: var(--btn-bg); color: var(--text); padding: 12px; }
        .nav-days { display: flex; gap: 10px; margin: 20px 0; }
        
        .hidden { display: none !important; }
        .status-badge { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        [data-theme="dark"] .status-badge { background: #1b5e20; color: #c8e6c9; }
        
        .reading-text, .search-results { font-size: var(--font-size); font-weight: var(--font-weight); }
        .ayat-line { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
        
        .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 15px;}
        .modal-content { background: var(--card); width: 100%; max-width: 600px; padding: 25px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .search-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. LOGIN -->
    <div id="login-page" class="card">
        <h2 style="text-align: center;">Login Sistem</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="prosesLogin()" id="btn-login">Masuk</button>
    </div>

    <!-- 2. SETTINGS (Tampil jika user belum punya setting) -->
    <div id="settings-page" class="card hidden">
        <h2>Pengaturan Pembacaan</h2>
        <p>Silakan tentukan target pembacaan dan tanggal mulai Anda.</p>
        <label>Pilih Rencana Pembacaan:</label>
        <select id="set-plan">
            <option value="Amsal 1 Bulan">Kitab Amsal (1 Bulan)</option>
            <option value="PB 1 Bulan">Perjanjian Baru (1 Bulan)</option>
            <option value="Alkitab 1 Tahun">Seluruh Alkitab (1 Tahun)</option>
        </select>
        <label>Tanggal Mulai Pembacaan:</label>
        <input type="date" id="set-date">
        <button onclick="simpanSetting()">Simpan & Mulai</button>
    </div>

    <!-- 3. DASHBOARD UTAMA -->
    <div id="app-page" class="hidden">
        <div class="toolbar">
            <button onclick="ubahFont(2)">A+</button>
            <button onclick="ubahFont(-2)">A-</button>
            <button onclick="toggleTebal()"><b>B</b></button>
            <button onclick="toggleTheme()">🌙/☀️</button>
            <button onclick="document.documentElement.requestFullscreen()">⛶ Full</button>
            <button onclick="bukaModalCari()" style="background: var(--primary); color: white;">🔍 Cari</button>
            <button onclick="logout()" style="background: #ff3b30; color: white;">Keluar</button>
        </div>

        <div class="card">
            <div class="status-badge" id="date-info">Memuat Data Tanggal...</div>
            <h2 id="judul-plan" style="text-align: center;">Memuat...</h2>

            <div class="nav-days">
                <button onclick="gantiHari(-1)">◀ Hari Sebelumnya</button>
                <button onclick="kembaliHariIni()" style="background: #34c759;">Hari Ini</button>
                <button onclick="gantiHari(1)">Hari Selanjutnya ▶</button>
            </div>

            <button onclick="salinTeks('reading-content')" style="margin-bottom: 20px;">📋 Salin Bacaan</button>

            <div id="reading-content" class="reading-text">Memuat ayat...</div>
        </div>
    </div>

    <!-- 4. MODAL PENCARIAN -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🔍 Pencarian Kitab & Ayat</h3>
            <div class="search-grid">
                <select id="search-book"></select>
                <input type="number" id="search-chapter" placeholder="Pasal">
                <input type="number" id="search-verse" placeholder="Ayat">
            </div>
            <button onclick="eksekusiPencarian()">Cari Ayat</button>
            <button onclick="salinTeks('search-results')" style="background: #34c759; margin-top: 10px;">📋 Salin Hasil Cari</button>
            <button onclick="tutupModalCari()" style="background: var(--btn-bg); color: var(--text); margin-top: 10px;">Tutup</button>
            
            <div id="search-results" class="search-results" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL APPS SCRIPT DARI DEPLOYMENT TERBARU
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzko444C-5xYKDWTYFX1H3XXfXZrolW-qfUM7puXdg0NK_naKUxeiVOlgdcm-YrjVDfKw/exec';
    
    let userSession = {};
    let currentHariKe = 1;
    let actualHariKe = 1; // Hari ke-N yang sebenarnya (dihitung dari tanggal mulai)
    let currentFontSize = 18;
    let isBold = false;

    const daftarkitab = ["Kejadian","Keluaran","Imamat","Bilangan","Ulangan","Yosua","Hakim-hakim","Rut","1 Samuel","2 Samuel","1 Raja-raja","2 Raja-raja","1 Tawarikh","2 Tawarikh","Ezra","Nehemia","Ester","Ayub","Mazmur","Amsal","Pengkhotbah","Kidung Agung","Yesaya","Yeremia","Ratapan","Yehezkiel","Daniel","Hosea","Yoel","Amos","Obaja","Yunus","Mikha","Nahum","Habakuk","Zefanya","Hagai","Zakharia","Maleakhi","Matius","Markus","Lukas","Yohanes","Kisah Para Rasul","Roma","1 Korintus","2 Korintus","Galatia","Efesus","Filipi","Kolose","1 Tesalonika","2 Tesalonika","1 Timotius","2 Timotius","Titus","Filemon","Ibrani","Yakobus","1 Petrus","2 Petrus","1 Yohanes","2 Yohanes","3 Yohanes","Yudas","Wahyu"];

    window.onload = () => {
        // Isi dropdown kitab
        const bookSelect = document.getElementById('search-book');
        daftarkitab.forEach(kitab => {
            let opt = document.createElement('option');
            opt.value = kitab; opt.innerText = kitab;
            bookSelect.appendChild(opt);
        });
    };

    // --- 1. OTENTIKASI & SETUP ---
    async function prosesLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (!u || !p) return alert("Isi lengkap!");
        
        document.getElementById('btn-login').innerText = "Memeriksa...";
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p })
            });
            const out = await res.json();
            
            if (out.status === "success") {
                userSession = out.data;
                document.getElementById('login-page').classList.add('hidden');
                
                // Cek apakah user sudah punya settingan plan & tanggal
                if (!userSession.plan || !userSession.start_date) {
                    document.getElementById('settings-page').classList.remove('hidden');
                } else {
                    kalkulasiTanggal();
                    document.getElementById('app-page').classList.remove('hidden');
                }
            } else {
                alert(out.message);
                document.getElementById('btn-login').innerText = "Masuk";
            }
        } catch(e) {
            alert("Error server.");
            document.getElementById('btn-login').innerText = "Masuk";
        }
    }

    async function simpanSetting() {
        const plan = document.getElementById('set-plan').value;
        const sDate = document.getElementById('set-date').value;
        if (!sDate) return alert("Pilih tanggal mulai!");

        userSession.plan = plan;
        userSession.start_date = sDate;

        await fetch(SCRIPT_URL, {
            method: 'POST', body: JSON.stringify({ action: "saveSettings", username: userSession.username, plan: plan, start_date: sDate })
        });

        document.getElementById('settings-page').classList.add('hidden');
        document.getElementById('app-page').classList.remove('hidden');
        kalkulasiTanggal();
    }

    // --- 2. LOGIKA TANGGAL & HARI ---
    function kalkulasiTanggal() {
        const start = new Date(userSession.start_date);
        const today = new Date(); // Hari ini secara real-time
        
        // Menghitung selisih hari (1 hari = 1000 * 60 * 60 * 24 ms)
        const diffTime = Math.abs(today - start);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); 
        
        // Jika start date adalah hari ini, maka hari ke-1
        actualHariKe = diffDays + 1; 
        currentHariKe = actualHariKe;
        
        updateUIInfoTanggal(today);
        muatAyatServer();
    }

    function updateUIInfoTanggal(dateObj) {
        const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date-info').innerHTML = 
            `Hari ini: ${new Date().toLocaleDateString('id-ID', opsi)} <br> 
             Anda sedang melihat bacaan <b>Hari ke-${currentHariKe}</b>`;
        document.getElementById('judul-plan').innerText = `${userSession.plan}`;
    }

    function gantiHari(arah) {
        if (currentHariKe + arah < 1) return alert("Ini adalah hari pertama.");
        currentHariKe += arah;
        
        const virtualDate = new Date(userSession.start_date);
        virtualDate.setDate(virtualDate.getDate() + (currentHariKe - 1));
        
        updateUIInfoTanggal(virtualDate);
        muatAyatServer();
    }

    function kembaliHariIni() {
        currentHariKe = actualHariKe;
        updateUIInfoTanggal(new Date());
        muatAyatServer();
    }

    // --- 3. AMBIL DATA DARI SERVER ---
    async function muatAyatServer() {
        const box = document.getElementById('reading-content');
        box.innerHTML = "<i>Mengambil data bacaan...</i>";
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST', body: JSON.stringify({ action: "getReading", plan: userSession.plan, hari_ke: currentHariKe })
            });
            const data = await res.json();
            
            if (data.status === "success") {
                box.innerHTML = data.teks.map(t => `<div class="ayat-line">${t}</div>`).join("");
            } else {
                box.innerHTML = `<span style="color:red">${data.message}</span>`;
            }
        } catch(e) {
            box.innerHTML = "Gagal memuat.";
        }
    }

    // --- 4. FITUR PENCARIAN ALKITAB SPESIFIK ---
    function bukaModalCari() { document.getElementById('search-modal').classList.remove('hidden'); }
    function tutupModalCari() { document.getElementById('search-modal').classList.add('hidden'); }

    async function eksekusiPencarian() {
        const book = document.getElementById('search-book').value;
        const chapter = document.getElementById('search-chapter').value;
        const verse = document.getElementById('search-verse').value;
        
        const box = document.getElementById('search-results');
        box.innerHTML = "<i>Mencari ayat...</i>";

        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST', body: JSON.stringify({ action: "searchSpesific", book: book, chapter: chapter, verse: verse })
            });
            const data = await res.json();

            if (data.status === "success" && data.data.length > 0) {
                box.innerHTML = data.data.map(t => `<div class="ayat-line">${t}</div>`).join("");
            } else {
                box.innerHTML = "Ayat tidak ditemukan.";
            }
        } catch(e) {
            box.innerHTML = "Error pencarian.";
        }
    }

    // --- 5. FITUR UI & UTILITAS ---
    function ubahFont(val) {
        currentFontSize += val;
        document.body.style.setProperty('--font-size', currentFontSize + 'px');
    }
    
    function toggleTebal() {
        isBold = !isBold;
        document.body.style.setProperty('--font-weight', isBold ? '700' : '400');
    }

    function toggleTheme() {
        const curr = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', curr === 'dark' ? 'light' : 'dark');
    }

    function salinTeks(elementId) {
        const container = document.getElementById(elementId);
        // Mengambil innerText mempertahankan format baris tanpa tag HTML
        const text = container.innerText;
        if (!text || text.includes("Mengambil data") || text.includes("Mencari ayat")) return alert("Belum ada teks valid untuk disalin.");
        
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ Teks berhasil disalin ke clipboard!");
        });
    }

    function logout() {
        userSession = {};
        document.getElementById('app-page').classList.add('hidden');
        document.getElementById('login-page').classList.remove('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }
</script>
</body>
</html>
