<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Reader Alkitab Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* TEMA WARNA (10 Tema) */
        :root { --bg: #f2f2f7; --text: #1c1c1e; --card: #ffffff; --primary: #007aff; --border: #d1d1d6; --btn-bg: #e5e5ea; --font-size: 18px; }
        
        /* 5 Tema Terang */
        [data-theme="light-default"] { --bg: #f2f2f7; --text: #1c1c1e; --card: #ffffff; --primary: #007aff; --border: #d1d1d6; --btn-bg: #e5e5ea; }
        [data-theme="light-sepia"] { --bg: #f4ecd8; --text: #433422; --card: #fbf0d9; --primary: #d97736; --border: #d7c9a9; --btn-bg: #eedfbe; }
        [data-theme="light-mint"] { --bg: #e8f5e9; --text: #1b5e20; --card: #ffffff; --primary: #2e7d32; --border: #c8e6c9; --btn-bg: #c8e6c9; }
        [data-theme="light-sky"] { --bg: #e3f2fd; --text: #0d47a1; --card: #ffffff; --primary: #1976d2; --border: #bbdefb; --btn-bg: #bbdefb; }
        [data-theme="light-peach"] { --bg: #fff0e5; --text: #5d4037; --card: #ffffff; --primary: #d84315; --border: #ffccbc; --btn-bg: #ffccbc; }

        /* 5 Tema Gelap */
        [data-theme="dark-default"] { --bg: #000000; --text: #f2f2f7; --card: #1c1c1e; --primary: #0a84ff; --border: #38383a; --btn-bg: #2c2c2e; }
        [data-theme="dark-ocean"] { --bg: #0b192c; --text: #e2e8f0; --card: #112240; --primary: #64ffda; --border: #233f62; --btn-bg: #1a365d; }
        [data-theme="dark-dracula"] { --bg: #282a36; --text: #f8f8f2; --card: #44475a; --primary: #ff79c6; --border: #6272a4; --btn-bg: #6272a4; }
        [data-theme="dark-forest"] { --bg: #142f1d; --text: #dcf2e3; --card: #1e452a; --primary: #4ade80; --border: #2a613b; --btn-bg: #2a613b; }
        [data-theme="dark-charcoal"] { --bg: #202020; --text: #e0e0e0; --card: #2d2d2d; --primary: #ffb74d; --border: #424242; --btn-bg: #424242; }

        /* GAYA FONT */
        body.font-apple { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body.font-comic { font-family: "Comic Sans MS", "Marker Felt", cursive; }
        body.font-roboto { font-family: 'Roboto', Arial, sans-serif; }
        body.font-courier { font-family: 'Courier New', Courier, monospace; }
        body.font-arial { font-family: Arial, Helvetica, sans-serif; }
        body.font-verdana { font-family: Verdana, Geneva, sans-serif; }

        /* BACKGROUND GOOGLE DRIVE HARDCODE */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            /* URL Drive Diubah ke format export=view agar bisa dirender sebagai gambar */
            background-image: url('https://drive.google.com/uc?export=view&id=1c7K5b2okVGA9OWcdL03sVbhF9s5OMjE2');
            background-size: cover; background-position: center; background-attachment: fixed;
            z-index: -1; opacity: 0.12; transition: opacity 0.3s;
        }
        [data-theme^="dark"] body::before { opacity: 0.05; } /* Lebih redup di mode gelap */

        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: var(--font-size); line-height: 1.8; transition: 0.3s; }
        
        .container { max-width: 800px; margin: auto; padding: 15px; transition: max-width 0.3s ease; }
        .container.full-width { max-width: 100%; padding: 5px; } 
        
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 16px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        
        /* MENU NAVIGASI */
        .collapsible-menu { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .menu-content { display: none; padding: 15px; border-top: 1px solid var(--border); background: var(--bg); }
        .menu-content.open { display: flex; flex-direction: column; gap: 10px; }
        
        .icon-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .icon-btn { flex: 1; min-width: 40px; background: var(--btn-bg); color: var(--text); font-size: 16px; padding: 10px; border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; font-weight: bold;}
        
        /* AREA BACAAN E-READER */
        .reading-area { padding: 20px 15px; min-height: 60vh; font-size: var(--font-size); text-align: justify; color: var(--custom-color, var(--text)); transition: color 0.3s;}
        .book-title { font-size: 1.6em; font-weight: bold; color: var(--primary); margin: 30px 0 15px 0; border-bottom: 2px solid var(--border); padding-bottom: 5px; }
        .verse-num { font-size: 0.6em; font-weight: bold; color: var(--primary); margin-right: 4px; vertical-align: super; }
        
        body.force-bold .reading-area { font-weight: bold; }
        body.force-underline .verse-text { text-decoration: underline; }
        
        .verse-item { display: inline; margin-right: 8px; transition: background-color 0.2s; border-radius: 5px; }
        .reading-area.mode-baris .verse-item { display: block; margin-bottom: 12px; }

        /* HIGHLIGHT SUARA (KONTRAST TINGGI) */
        .highlight-tts { background-color: #ffeb3b !important; color: #000000 !important; box-shadow: 0 0 5px #ffeb3b; padding: 2px 4px; font-weight: bold; }

        .hidden { display: none !important; }
        
        /* MODAL */
        .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; z-index: 1000; overflow-y: auto; padding: 10px; }
        .modal-content { background: var(--bg); width: 100%; max-width: 800px; padding: 20px; border-radius: 16px; display: flex; flex-direction: column; transition: max-width 0.3s ease; min-height: 90vh; }
        .modal-content.full-width-modal { max-width: 100%; padding: 10px; border-radius: 0; }
    </style>
</head>
<body class="font-apple" data-theme="light-default">

<div class="container" id="main-container">
    <!-- 1. LOGIN -->

    <!-- 3. DASHBOARD BACAAN -->

        <!-- MENU LIPAT UTAMA -->

                    <button class="icon-btn" onclick="kembaliHariIni()">📅 Hari Ini</button>

                    <select class="icon-btn" style="flex:2; margin:0;" onchange="gantiWarnaFont(this.value)">

                <div class="icon-bar">
                    <select class="icon-btn" style="flex:2; margin:0;" onchange="gantiGayaFont(this.value)">
                        <option value="font-apple">Font: Apple</option>
                        <option value="font-roboto">Font: Roboto</option>
                        <option value="font-arial">Font: Arial</option>
                        <option value="font-verdana">Font: Verdana</option>
                        <option value="font-courier">Font: Courier</option>
                        <option value="font-comic">Font: Comic</option>
                    </select>
                    <select class="icon-btn" style="flex:2; margin:0;" id="theme-selector-app" onchange="gantiTema(this.value)">
                        <option value="light-default">Tema: Terang</option>
                        <option value="light-sepia">Tema: Sepia</option>
                        <option value="dark-default">Tema: Gelap</option>
                        <option value="dark-ocean">Tema: Biru Laut</option>
                    </select>
                </div>
                
                <div class="icon-bar">
                    <select id="voice-lang-filter" class="icon-btn" style="flex:1; margin:0;" onchange="filterVoice()">

                        <option value="id">🇮🇩 ID</option>

                        <option value="zh">🇨🇳 ZH</option>

                <div class="icon-bar">

                <div class="icon-bar">

                </div>
                <div class="icon-bar">

                    <input type="range" id="voice-pitch" min="0.1" max="2" step="0.1" value="1" style="flex:1;" title="Artikulasi (Pitch)" oninput="updateSpeedLabel()">
                    
                    <button class="icon-btn" style="background:#34c759; color:white;" onclick="bacakanTeks('reading-content')">🗣️ ▶</button>

                <div class="icon-bar">

    <!-- 4. MODAL PENCARIAN -->

                        <button class="icon-btn" onclick="document.body.classList.toggle('force-bold')">B</button>
                        <button class="icon-btn" onclick="document.body.classList.toggle('force-underline')"><u>U</u></button>

                    </div>

                    <!-- TTS & Lebar Layar di Modal Pencarian -->
                    <div class="icon-bar" style="margin-top: 10px;">

<script>
    // MASUKKAN URL APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkArnOHzW7ugnSS6J3Wx0LhsVt-tfsV0kgV1kcsFBPoTmet1MMTpAvgjJ4PwQksO4IZA/exec';
    
    let userSession = {};
    let currentHariKe = 1;
    let actualHariKe = 1; 
    let currentFontSize = 18;
    
    // Variabel TTS
    let allVoices = [];
    let verseQueue = [];
    let isReading = false;
    let currentVerseIndex = 0;

    const daftarkitab = ["Kejadian","Keluaran","Imamat","Bilangan","Ulangan","Yosua","Hakim-hakim","Rut","1 Samuel","2 Samuel","1 Raja-raja","2 Raja-raja","1 Tawarikh","2 Tawarikh","Ezra","Nehemia","Ester","Ayub","Mazmur","Amsal","Pengkhotbah","Kidung Agung","Yesaya","Yeremia","Ratapan","Yehezkiel","Daniel","Hosea","Yoel","Amos","Obaja","Yunus","Mikha","Nahum","Habakuk","Zefanya","Hagai","Zakharia","Maleakhi","Matius","Markus","Lukas","Yohanes","Kisah Para Rasul","Roma","1 Korintus","2 Korintus","Galatia","Efesus","Filipi","Kolose","1 Tesalonika","2 Tesalonika","1 Timotius","2 Timotius","Titus","Filemon","Ibrani","Yakobus","1 Petrus","2 Petrus","1 Yohanes","2 Yohanes","3 Yohanes","Yudas","Wahyu"];

    window.onload = () => {
        const bookSelect = document.getElementById('search-book');
        daftarkitab.forEach(k => bookSelect.appendChild(new Option(k, k)));
        
        speechSynthesis.onvoiceschanged = ambilSemuaSuara;
        ambilSemuaSuara(); 
    };

    function toggleMenu(id) { document.getElementById(id).classList.toggle('open'); }

    // --- MANAJEMEN SUARA MULTI-BAHASA & GENDER ---
    function ambilSemuaSuara() {
        allVoices = speechSynthesis.getVoices();
        filterVoice(); 
    }

    function filterVoice() {
        const langFilter = document.getElementById('voice-lang-filter').value;
        const genderFilter = document.getElementById('voice-gender-filter').value;
        const select = document.getElementById('voice-select');
        select.innerHTML = '';
        
        allVoices.forEach((v, index) => {
            let nameLower = v.name.toLowerCase();
            let langCode = v.lang.toLowerCase();
            
            let isFemale = nameLower.includes('female') || nameLower.includes('girl') || nameLower.includes('woman');
            let isMale = nameLower.includes('male') || nameLower.includes('boy');
            let genderLabel = isFemale ? '♀' : (isMale ? '♂' : '⚙️');
            
            let matchLang = langFilter === 'all' || langCode.includes(langFilter);
            let matchGender = genderFilter === 'all' || (genderFilter === 'female' && isFemale) || (genderFilter === 'male' && isMale);

            if (matchLang && matchGender) {
                select.appendChild(new Option(`${genderLabel} ${v.name} (${v.lang})`, index));
            }
        });
    }

    function updateSpeedLabel() {
        const speed = document.getElementById('voice-speed').value;
        const pitch = document.getElementById('voice-pitch').value;
        document.getElementById('speed-label').innerText = `Kec: ${speed}x | Art: ${pitch}`;
    }

    // --- HIGHLIGHT TTS (MODE KARAOKE) ---
    function bacakanTeks(containerId) {
        hentikanSuara(); 
        
        verseQueue = Array.from(document.querySelectorAll(`#${containerId} .verse-item`));
        if (verseQueue.length === 0) return alert("Belum ada teks untuk dibaca.");
        
        isReading = true;
        currentVerseIndex = 0;
        bacaAyatSelanjutnya();
    }

    function bacaAyatSelanjutnya() {
        if (!isReading || currentVerseIndex >= verseQueue.length) {
            hentikanSuara();
            return;
        }

        hapusHighlight();
        let elAyat = verseQueue[currentVerseIndex];
        elAyat.classList.add('highlight-tts');

        let textToRead = elAyat.querySelector('.verse-text').innerText;
        let msg = new SpeechSynthesisUtterance(textToRead);
        
        let selIdx = document.getElementById('voice-select').value;
        if(allVoices[selIdx]) msg.voice = allVoices[selIdx];
        
        msg.rate = parseFloat(document.getElementById('voice-speed').value);
        msg.pitch = parseFloat(document.getElementById('voice-pitch').value); 

        msg.onend = () => {
            currentVerseIndex++;
            bacaAyatSelanjutnya();
        };
        msg.onerror = () => { hentikanSuara(); };

        window.speechSynthesis.speak(msg);
    }

    function hentikanSuara() {
        isReading = false;
        window.speechSynthesis.cancel();
        hapusHighlight();
    }

    function hapusHighlight() {
        document.querySelectorAll('.highlight-tts').forEach(el => el.classList.remove('highlight-tts'));
    }

    // --- LAYOUT & TEMA ---
    function toggleLebarLayar(elementId) {
        document.getElementById(elementId).classList.toggle('full-width');
        if(elementId === 'search-container') document.getElementById(elementId).classList.toggle('full-width-modal');
    }

    function toggleModeBaris() {
        document.getElementById('reading-content').classList.toggle('mode-baris');
        document.getElementById('search-results').classList.toggle('mode-baris');
    }

    function gantiWarnaFont(warna) {
        if(warna) document.body.style.setProperty('--custom-color', warna);
        else document.body.style.removeProperty('--custom-color');
    }

    function ubahFont(val) { currentFontSize += val; document.body.style.setProperty('--font-size', currentFontSize + 'px'); }
    
    function gantiTema(tema) { 
        document.body.setAttribute('data-theme', tema); 
        // Sinkronisasi dropdown tema di Dashboard jika diubah dari Login
        let appSelector = document.getElementById('theme-selector-app');
        if(appSelector) appSelector.value = tema;
    }
    
    function gantiGayaFont(kelas) { document.body.className = kelas; }

    function renderEreaderHtml(ayatArray, containerId, targetWordCountId) {
        const box = document.getElementById(containerId);
        if (!ayatArray || ayatArray.length === 0) {
            box.innerHTML = "<h3 style='text-align:center; color:red;'>Ayat tidak ditemukan.</h3>";
            if(targetWordCountId) document.getElementById(targetWordCountId).innerText = "Kata: 0";
            return;
        }

        let htmlOut = "";
        let currentHeader = "";
        let wordCount = 0;

        ayatArray.forEach(a => {
            let header = `${a.b} ${a.c}`;
            if (header !== currentHeader) {
                htmlOut += `<div class="book-title">${header}</div>`;
                currentHeader = header;
            }
            htmlOut += `<div class="verse-item"><span class="verse-num">${a.v}</span><span class="verse-text">${a.t}</span></div>`;
            
            let words = a.t.trim().split(/\s+/);
            wordCount += words.length;
        });

        box.innerHTML = htmlOut;
        if(targetWordCountId) document.getElementById(targetWordCountId).innerText = `Kata: ${wordCount}`;
    }

    // --- OTENTIKASI & BACAAN ---
    async function prosesLogin() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        if (!u || !p) return alert("Isi Username & Password!");
        document.getElementById('btn-login').innerText = "Memeriksa...";
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) });
            const out = await res.json();
            if (out.status === "success") {
                userSession = out.data;
                document.getElementById('login-page').classList.add('hidden');
                if (!userSession.plan || !userSession.start_date) document.getElementById('settings-page').classList.remove('hidden');
                else { document.getElementById('app-page').classList.remove('hidden'); kalkulasiTanggal(); }
            } else { alert(out.message); document.getElementById('btn-login').innerText = "Masuk Aplikasi"; }
        } catch(e) { alert("Error Server."); document.getElementById('btn-login').innerText = "Masuk Aplikasi"; }
    }

    async function simpanSetting() {
        userSession.plan = document.getElementById('set-plan').value;
        userSession.start_date = document.getElementById('set-date').value;
        if (!userSession.start_date) return alert("Pilih tanggal!");
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "saveSettings", username: userSession.username, plan: userSession.plan, start_date: userSession.start_date }) });
        document.getElementById('settings-page').classList.add('hidden');
        document.getElementById('app-page').classList.remove('hidden');
        kalkulasiTanggal(); 
    }

    function kalkulasiTanggal() {
        const diffDays = Math.floor((new Date() - new Date(userSession.start_date)) / (1000 * 60 * 60 * 24)); 
        actualHariKe = diffDays + 1; currentHariKe = actualHariKe;
        muatAyatServer();
    }
    
    function gantiHari(arah) { hentikanSuara(); if(currentHariKe + arah < 1) return; currentHariKe += arah; muatAyatServer(); }
    function kembaliHariIni() { hentikanSuara(); currentHariKe = actualHariKe; muatAyatServer(); }

    async function muatAyatServer() {
        const box = document.getElementById('reading-content');
        box.innerHTML = "<h3 style='text-align:center;'>⏳ Mengunduh ayat...</h3>";
        document.getElementById('header-title').innerText = `${userSession.plan} (Hari ${currentHariKe})`;
        try {
            let payload = userSession.plan === "Amsal 1 Bulan" ? { action: "searchSpesific", book: "Amsal", chapter: currentHariKe } : { action: "getReading", plan: userSession.plan, hari_ke: currentHariKe };
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            document.getElementById('main-menu').classList.remove('open');
            renderEreaderHtml(data.ayat, 'reading-content', 'word-count');
        } catch(e) { box.innerHTML = "Gagal memuat ayat."; }
    }

    // --- PENCARIAN & AUTO-TUTUP MENU ---
    function bukaModalCari() { 
        hentikanSuara();
        document.getElementById('search-modal').classList.remove('hidden'); 
        // Buka menu penuh saat masuk pencarian pertama kali
        document.getElementById('search-menu').classList.add('open'); 
    }
    function tutupModalCari() { hentikanSuara(); document.getElementById('search-modal').classList.add('hidden'); }

    async function eksekusiPencarian() {
        const book = document.getElementById('search-book').value, chapter = document.getElementById('search-chapter').value;
        const vStart = document.getElementById('search-verse-start').value, vEnd = document.getElementById('search-verse-end').value;
        if(!chapter) return alert("Pasal wajib diisi!");
        
        document.getElementById('search-results').innerHTML = "<h3>⏳ Sedang mencari...</h3>";
        
        // Auto-Tutup Menu Navigasi Pencarian
        document.getElementById('search-menu').classList.remove('open');
        
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "searchSpesific", book: book, chapter: chapter, verse_start: vStart, verse_end: vEnd }) });
            const data = await res.json();
            renderEreaderHtml(data.ayat, 'search-results', null);
        } catch(e) { document.getElementById('search-results').innerHTML = "Gagal mencari."; }
    }

    function salinTeks(elId) {
        let txt = document.getElementById(elId).innerText;
        navigator.clipboard.writeText(txt).then(() => alert("✅ Tercopy!"));
    }

    function tandaiSelesai() {
        hentikanSuara();
        if(userSession.plan === "Amsal 1 Bulan" && currentHariKe === 31) {
            let dur = 5000, end = Date.now() + dur;
            let int = setInterval(function() {
                if (Date.now() > end) return clearInterval(int);
                confetti({ particleCount: 50, startVelocity: 30, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 } });
            }, 250);
            setTimeout(() => alert("🎉 HALELUYA! Anda menyelesaikan Kitab Amsal!"), 1000);
        } else {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => alert(`🎉 Bacaan Hari ke-${currentHariKe} selesai!`), 500);
        }
    }
    function logout() { hentikanSuara(); location.reload(); }
</script>
</body>
</html>
